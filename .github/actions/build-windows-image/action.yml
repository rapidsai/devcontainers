name: build-windows-image

description: Build a Windows Container on Windows image with CUDA and MSVC

inputs:
  cl:
    type: string
    required: false
    description: MSVC compiler version
  tag:
    type: string
    required: true
    description: Image tag
  repo:
    type: string
    required: true
    description: Image repo
  cuda:
    type: string
    required: false
    description: CUDA Toolkit version
  edition:
    type: string
    required: false
    description: Windows edition
  version:
    type: string
    required: false
    description: Repository version
  isolation:
    type: string
    required: false
    default: process
    description: Windows isolation mode to target (hyperv or process isolation)

runs:
  using: composite
  steps:
    - name: Build ${{ inputs.repo }}:${{ inputs.tag }}
      shell: powershell
      env:
        REPO: ${{ inputs.repo }}
        CL: ${{ inputs.cl }}
        CUDA: ${{ inputs.cuda }}
        VERSION: ${{ inputs.version }}
        ISOLATION: ${{ inputs.isolation }}
        EDITION: ${{ inputs.edition }}
      run: |
        .\windows\build-windows-image.ps1 `
          -repo $env:REPO `
          -clVersion $env:CL `
          -cudaVersion $env:CUDA `
          -repoVersion $env:VERSION `
          -isolation $env:ISOLATION `
          -edition windows$env:EDITION
